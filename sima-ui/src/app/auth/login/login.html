<div class="login-page-background">
  <!-- ECharts Background Container -->
  <div id="login-background-chart" class="background-chart"></div>
  
  <div class="glass-container">
    <form class="login-form" (ngSubmit)="login()" #loginForm="ngForm">
      <h1>Welcome</h1>

      <div class="input-group">
        <input 
          type="text" 
          placeholder="Username" 
          [(ngModel)]="username" 
          name="username" 
          (input)="onInputChange()"
          required
          class="form-control"
          [class.error]="errorMessage" />
      </div>

      <div class="input-group">
        <input 
          type="password" 
          placeholder="Password" 
          [(ngModel)]="password" 
          name="password" 
          (input)="onInputChange()"
          required
          class="form-control"
          [class.error]="errorMessage" />
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" class="login-button" [disabled]="isLoading || !username || !password">
        {{ isLoading ? 'Logging in...' : 'Login' }}
      </button>

      <div class="links-group">
        <!-- <a href="#" class="forgot-password">Forgot Password ?</a> -->
        <!-- <a href="#" class="sign-up">Sign Up</a> -->
      </div>
    </form>
  </div>
</div>
