<div
  class="menu-item"
  [class.active]="!item.children && item.route"
  routerLinkActive="active"
  [class.has-children]="item.children"
  (click)="toggle()"
>
  <span class="menu-text">{{ item.title }}</span>
  <svg *ngIf="item.children" class="arrow-icon" [class.rotated]="expanded"
    width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <polyline points="6 9 12 15 18 9"/>
  </svg>
</div>

<ul class="submenu" [class.show]="expanded" *ngIf="item.children">
  <li *ngFor="let child of item.children">
    <app-menu-item [item]="child" (closeSidebar)="closeSidebar.emit()"></app-menu-item>
  </li>
</ul>
