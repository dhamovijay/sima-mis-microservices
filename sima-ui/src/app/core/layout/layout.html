<div class="app" [class.dark-theme]="isDark">
  <app-sidebar
    [isOpen]="sidebarOpen"
    (closeSidebar)="sidebarOpen = false"
    (themeChange)="isDark = $event"
  ></app-sidebar>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" (click)="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="app-title">SIMA Monitoring</h1>
      </div>
      <div class="topbar-right">
        <button class="topbar-btn" (click)="toggleTheme()">
          {{ isDark ? '&#9788;' : '&#9790;' }}
          <span>{{ isDark ? 'Light' : 'Dark' }}</span>
        </button>
        <button class="topbar-btn logout" (click)="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          <span>Logout</span>
        </button>
      </div>
    </header>

    <main class="screen-area scrollable">
      <router-outlet></router-outlet>
    </main>

    <app-footer></app-footer>
  </div>
</div>
