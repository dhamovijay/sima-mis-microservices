<div class="report-container">
  <!-- Filter Section -->
  <div class="filter-card">
    <div class="filter-fields">
      <div class="form-group">
        <label for="year">Year</label>
        <select id="year" [(ngModel)]="year">
          <option *ngFor="let y of yearList" [value]="y">{{ y }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="month">Month</label>
        <select id="month" [(ngModel)]="month">
          <option *ngFor="let m of monthDropDownList" [value]="m.id">{{ m.text }}</option>
        </select>
      </div>

      <button class="filter-btn" (click)="loadData()" [disabled]="loading">
        <span *ngIf="!loading">Filter</span>
        <span *ngIf="loading">Loading...</span>
      </button>
    </div>
  </div>

  <!-- Main Bar Chart -->
  <div class="chart-panel" *ngIf="serviceList.length > 0">
    <div #leftChart class="chart-canvas"></div>
    <div class="chart-hint" *ngIf="!showSync">
      Click on a service bar to view 24-month breakup charts
    </div>
  </div>

  <!-- Breakup Charts (below main chart, side by side) -->
  <div class="sync-row" *ngIf="showSync">
    <div class="sync-panel">
      <div #volumeChart class="sync-chart-full"></div>
    </div>
    <div class="sync-panel">
      <div #blendedChart class="sync-chart-full"></div>
    </div>
    <div class="sync-panel">
      <div #marginChart class="sync-chart-full"></div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="chart-placeholder" *ngIf="serviceList.length === 0 && !loading">
    <p>Select filters and click "Filter" to view results.</p>
  </div>
</div>
