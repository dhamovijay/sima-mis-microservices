<div class="report-container">
  <!-- Filter Section -->
  <div class="filter-card">
    <div class="filter-fields">
      <div class="form-group">
        <label for="year">Year</label>
        <select id="year" [(ngModel)]="year">
          <option *ngFor="let y of yearList" [value]="y">{{ y }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="month">Month</label>
        <select id="month" [(ngModel)]="month">
          <option *ngFor="let m of monthDropDownList" [value]="m.id">{{ m.text }}</option>
        </select>
      </div>

      <button class="filter-btn" (click)="loadData()" [disabled]="loading">
        <span *ngIf="!loading">Filter</span>
        <span *ngIf="loading">Loading...</span>
      </button>

      <!-- Palette Selector -->
      <div class="palette-selector" *ngIf="serviceList.length > 0">
        <label>Theme</label>
        <div class="palette-options">
          <button
            *ngFor="let key of paletteKeys"
            class="palette-btn"
            [class.active]="selectedPalette === key"
            (click)="changePalette(key)"
            [title]="key"
          >
            <span class="palette-preview"
              *ngFor="let color of [0, 1, 2]"
              [style.background]="key">
            </span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Charts Area -->
  <div class="charts-wrapper" *ngIf="serviceList.length > 0">
    <!-- Left Chart: Variwide / Bar Chart -->
    <div class="chart-panel left-panel">
      <div #leftChart class="chart-canvas"></div>
    </div>

    <!-- Right Charts: Synchronized breakup charts -->
    <div class="chart-panel right-panel" *ngIf="showSync">
      <div class="sync-chart-wrapper">
        <div #volumeChart class="sync-chart"></div>
        <div #blendedChart class="sync-chart"></div>
        <div #marginChart class="sync-chart"></div>
      </div>
    </div>

    <div class="chart-panel right-panel hint-panel" *ngIf="!showSync">
      <div class="hint-text">
        Click on a service bar to view 24-month breakup charts
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="chart-placeholder" *ngIf="serviceList.length === 0 && !loading">
    <p>Select filters and click "Filter" to view results.</p>
  </div>
</div>
